<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grace — Dividends</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', -apple-system, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%);
      color: white;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    header h1  { font-size: 20px; font-weight: 500; }
    header sub { font-size: 12px; opacity: .85; display: block; margin-top: 2px; }

    .btn-signin {
      background: white; color: #1a73e8;
      border: none; padding: 8px 18px; border-radius: 6px;
      cursor: pointer; font-size: 14px; font-weight: 500;
    }
    .btn-signin:hover { background: #e8f0fe; }
    #userInfo { font-size: 13px; color: rgba(255,255,255,.9); }

    /* ── Status bar ── */
    .statusbar {
      background: white; border-bottom: 1px solid #e0e0e0;
      padding: 7px 24px; display: flex; align-items: center;
      gap: 10px; font-size: 13px; color: #5f6368; flex-shrink: 0;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #34a853; }
    .dot.spin  { background: #fbbc04; animation: blink 1s infinite; }
    .dot.error { background: #ea4335; }
    .dot.warn  { background: #ff9800; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ── Main ── */
    main { flex: 1; padding: 20px 24px; overflow: auto; }

    .card {
      background: white; border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,.12); overflow: hidden;
    }

    .card-head {
      padding: 13px 20px;
      border-bottom: 2px solid #1a73e8;
      display: flex; justify-content: space-between; align-items: center;
    }
    .card-head h2 { font-size: 14px; font-weight: 700; color: #202124; text-transform: uppercase; letter-spacing: .4px; }
    .card-head span { font-size: 12px; color: #5f6368; }

    .tbl-wrap { overflow-x: auto; }

    /* ── Grid table ── */
    table { width: 100%; border-collapse: collapse; }

    thead tr { background: #e8f0fe; }
    th {
      padding: 10px 12px; text-align: left;
      font-size: 12px; font-weight: 700;
      color: #1a73e8; white-space: nowrap;
      border-right: 1px solid #c5d8fb;
    }
    th:last-child { border-right: none; }
    th.th-del { width: 32px; }

    td {
      border-bottom: 1px solid #e8eaed;
      border-right: 1px solid #e8eaed;
      padding: 0;
    }
    td:last-child { border-right: none; }

    td input {
      width: 100%; border: none; outline: none;
      padding: 9px 12px; font-size: 14px; font-family: inherit;
      background: transparent; color: #202124; min-width: 80px;
    }
    td input:focus {
      background: #fffde7;
      box-shadow: inset 0 0 0 2px #1a73e8;
    }
    td input.roi-cell {
      background: #e8f0fe;
      color: #1a57c8;
      font-weight: 600;
      cursor: default;
    }
    td input.roi-cell:focus { background: #e8f0fe; box-shadow: none; }

    td input.computed-cell {
      background: #fce4ec;
      color: #880e4f;
      font-weight: 600;
      cursor: default;
    }
    td input.computed-cell:focus { background: #fce4ec; box-shadow: none; }


    /* Seasonal fruit */
    #seasonal-fruit {
      position: fixed; bottom: 18px; left: 18px;
      z-index: 999; pointer-events: none;
      animation: fruit-bob 2.8s ease-in-out infinite;
    }
    #seasonal-fruit .fruit-label {
      text-align: center; font-size: 11px;
      color: #5f6368; margin-top: 4px;
      font-weight: 600; letter-spacing: .3px;
    }
    @keyframes fruit-bob {
      0%,100% { transform: translateY(0);   }
      50%      { transform: translateY(-8px); }
    }

    tr:nth-child(even) td { background: #fafafa; }
    tr:hover td           { background: #f1f8fe !important; }
    tr:hover td input:focus { background: #fffde7 !important; }

    td.td-del { width: 32px; text-align: center; }
    .del-btn {
      background: none; border: none;
      color: #ccc; cursor: pointer; font-size: 15px;
      padding: 5px 7px; border-radius: 4px;
      transition: color .15s, background .15s;
      display: block; margin: auto;
    }
    .del-btn:hover { color: #ea4335; background: #fce8e6; }

    /* add-row */
    .tr-add td { border-bottom: none; }
    .add-btn {
      width: 100%; padding: 9px; padding-left: 48px;
      background: none; border: none; text-align: left;
      color: #1a73e8; font-size: 13px; cursor: pointer;
    }
    .add-btn:hover { background: #f0f7ff; }

    /* ── Footer ── */
    footer {
      background: white; border-top: 1px solid #e0e0e0;
      padding: 13px 24px;
      display: flex; justify-content: flex-end;
      align-items: center; gap: 10px; flex-shrink: 0;
    }
    #footerMsg { margin-right: auto; font-size: 13px; color: #5f6368; }
    #footerMsg.ok  { color: #34a853; }
    #footerMsg.err { color: #ea4335; }

    .btn {
      padding: 9px 22px; border-radius: 6px;
      font-size: 14px; font-weight: 500;
      cursor: pointer; border: none; transition: all .15s;
    }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn-save   { background: #1a73e8; color: white; }
    .btn-save:hover:not(:disabled)   { background: #1557b0; }
    .btn-cancel { background: #5f6368; color: white; }
    .btn-cancel:hover:not(:disabled) { background: #3c4043; }
    .btn-exit   { background: none; color: #5f6368; border: 1px solid #dadce0; }
    .btn-exit:hover { background: #f1f3f4; }

    /* ── Saving overlay ── */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.35); z-index: 300;
      align-items: center; justify-content: center;
    }
    .overlay.on { display: flex; }
    .overlay-box {
      background: white; padding: 32px 48px;
      border-radius: 12px; text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,.15);
    }
    .spinner {
      width: 36px; height: 36px; border: 3px solid #e0e0e0;
      border-top-color: #1a73e8; border-radius: 50%;
      animation: spin .8s linear infinite; margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- Saving overlay -->
<div class="overlay" id="overlay">
  <div class="overlay-box">
    <div class="spinner"></div>
    <div>Saving to Google Sheets…</div>
  </div>
</div>

<!-- Header -->
<header>
  <div>
    <h1>Grace — Dividend Tracker</h1>
    <sub>OtherNote.xlsx › devidends &nbsp;|&nbsp; Columns A – F</sub>
  </div>
  <div>
    <button class="btn-signin" id="signInBtn" onclick="signIn()">🔑 Sign in to Edit</button>
    <span id="userInfo" style="display:none">✓ Signed in — edit mode active</span>
  </div>
</header>

<!-- Status bar -->
<div class="statusbar">
  <div class="dot" id="dot"></div>
  <span id="statusMsg">Initialising…</span>
</div>

<!-- Grid -->
<main>
  <div class="card">
    <div class="card-head">
      <h2>Dividends</h2>
      <span id="rowCount"></span>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead id="thead"></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</main>

<!-- Footer buttons -->
<footer>
  <span id="footerMsg"></span>
  <button class="btn btn-cancel" id="cancelBtn" onclick="cancelChanges()">Cancel</button>
  <button class="btn btn-save"   id="saveBtn"   onclick="saveData()">Save</button>
  <button class="btn btn-exit"   onclick="exitPage()">Exit</button>
</footer>

<div id="seasonal-fruit"></div>

<script src="https://accounts.google.com/gsi/client" async></script>
<script>
  /* ── Config ── */
  const CLIENT_ID      = '944388535773-h9npofkg9llnfqq79te504j5adfofshq.apps.googleusercontent.com';
  const API_KEY        = 'AIzaSyCQjHQbMlSYHLWWFNhqCwy4u3zisCyknqo';
  const SPREADSHEET_ID = '1JgVO35PwZYDHnzjR22-SgTx6PvrXpAkV';
  const SHEET_NAME     = 'devidends';
  const RANGE          = `${SHEET_NAME}!A:F`;

  /* ── Fallback data (read from Google Drive 2026-04-26) ── */
  const SEED = [
    ['Institution','Product','Funding','Monthly Average','ROI%','Frequency'],
    ['HSBC',      '聯博',    '$146,500', '$1,192', '9.8%',  '每月初'],
    ['',          '富蘭克林','$83,500',  '$702',   '10.1%', '1,4,7,11月初'],
    ['',          'TWD',     '$7,130,000','$58,693','',     ''],
    ['富貴角10號', '0056',   '$2,276,211','$17,320','9.1%', '2,5,8,11月中'],
    ['',          '00900',  '$2,302,927','$12,000','6.3%',  '每月20日'],
    ['',          '00919',  '$465,887',  '$5,200', '',      '1,4,7,10月中'],
    ['',          '台積電', '$1,261,505','',       '',      ''],
    ['',          'TWD',    '$6,306,530','$44,920','',      ''],
    ['新光',      'Deposit','$6,631,000','',       '',      ''],
    ['',          'Available','$324,470','',       '',      ''],
  ];

  /* ── State ── */
  let accessToken  = null;
  let tokenClient  = null;
  let savedData    = null;
  let editable     = false;
  let pendingSave  = false;

  /* ── Boot ── */
  window.onload = () => {
    loadData();
    const wait = setInterval(() => {
      if (window.google?.accounts) {
        clearInterval(wait);
        tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: CLIENT_ID,
          scope: 'https://www.googleapis.com/auth/spreadsheets',
          callback: resp => {
            if (resp.error) return;
            accessToken = resp.access_token;
            setEditable(true);
            loadData();
            if (pendingSave) { pendingSave = false; saveData(); }
          }
        });
      }
    }, 200);
  };

  /* ── Auth ── */
  function signIn() {
    if (!tokenClient) { alert('Google sign-in is still loading, please try again.'); return; }
    tokenClient.requestAccessToken();
  }

  function setEditable(on) {
    editable = on;
    document.getElementById('signInBtn').style.display = on ? 'none' : '';
    document.getElementById('userInfo').style.display  = on ? '' : 'none';
    if (savedData) renderGrid(savedData);
  }

  /* ── Load ── */
  async function loadData() {
    setDot('spin'); setStatus('Loading data from Google Sheets…');
    try {
      let url, opts = {};
      if (accessToken) {
        url  = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(RANGE)}`;
        opts = { headers: { Authorization: `Bearer ${accessToken}` } };
      } else {
        url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(RANGE)}?key=${API_KEY}`;
      }
      const res  = await fetch(url, opts);
      const json = await res.json();
      if (!res.ok) throw new Error(json.error?.message || `HTTP ${res.status}`);
      const vals = json.values || [];
      if (!vals.length) throw new Error('Sheet returned no data');
      savedData = vals;
      renderGrid(vals);
      setDot('ok'); setStatus(`${vals.length - 1} rows loaded from Google Sheets`);
    } catch (err) {
      savedData = SEED;
      renderGrid(SEED);
      setDot('warn'); setStatus(`Showing cached data (API unavailable: ${err.message})`);
    }
  }

  /* ── Render ── */
  function renderGrid(data) {
    const thead = document.getElementById('thead');
    const tbody = document.getElementById('tbody');
    const cols  = data[0];
    const rows  = data.slice(1);

    /* header */
    thead.innerHTML = '<tr>'
      + '<th class="th-del"></th>'
      + cols.map(h => `<th>${esc(h)}</th>`).join('')
      + '</tr>';

    /* rows */
    tbody.innerHTML = rows.map(row => buildRow(cols, row)).join('');

    /* add-row footer row (always visible) */
    const tr  = document.createElement('tr');
    tr.className = 'tr-add';
    const td  = document.createElement('td');
    td.colSpan = cols.length + 1;
    td.innerHTML = '<button class="add-btn" onclick="addRow()">＋ Add Row</button>';
    tr.appendChild(td);
    tbody.appendChild(tr);

    document.getElementById('rowCount').textContent = rows.length + ' rows';
    recalcSummaryRows();
  }

  function buildRow(cols, row) {
    const fundIdx    = cols.findIndex(c => /funding/i.test(c));
    const monthlyIdx = cols.findIndex(c => /monthly/i.test(c));
    const roiIdx     = cols.findIndex(c => /roi/i.test(c));
    const prodIdx    = cols.findIndex(c => /product/i.test(c));
    const product    = (row[prodIdx] ?? '').trim();
    const isGroupSum = product === 'TWD' || product === 'Available';

    const del = `<td class="td-del"><button class="del-btn" title="Delete" onclick="deleteRow(this)">✕</button></td>`;
    const cells = cols.map((_, i) => {
      const v = row[i] ?? '';
      if (i === roiIdx) {
        return `<td><input type="text" class="roi-cell" data-col="${i}" value="${esc(v)}" readonly
                     title="Auto-calculated: Monthly Average × 12 ÷ Funding"></td>`;
      }
      if (isGroupSum && (i === fundIdx || i === monthlyIdx)) {
        return `<td><input type="text" class="computed-cell" data-col="${i}" value="${esc(v)}" readonly
                     title="Auto-computed from group rows"></td>`;
      }
      const handler = (i === fundIdx || i === monthlyIdx)
        ? `oninput="onCellChange(this)"` : '';
      return `<td><input type="text" data-col="${i}" value="${esc(v)}" ${handler}></td>`;
    }).join('');
    return `<tr${isGroupSum ? ' class="summary-row"' : ''}>${del}${cells}</tr>`;
  }

  /* ── Cell change handler ── */
  function onCellChange(inp) {
    recalcSummaryRows();
  }

  /* ── Column indices helper ── */
  function getColIdx() {
    const cols = Array.from(
      document.getElementById('thead').querySelectorAll('th:not(.th-del)')
    ).map(th => th.textContent);
    return {
      inst  : cols.findIndex(c => /institution/i.test(c)),
      prod  : cols.findIndex(c => /product/i.test(c)),
      fund  : cols.findIndex(c => /funding/i.test(c)),
      month : cols.findIndex(c => /monthly/i.test(c)),
      roi   : cols.findIndex(c => /roi/i.test(c)),
    };
  }

  /* ── ROI for one row ── */
  function recalcROI(anyInput) {
    const { fund: fi, month: mi, roi: ri } = getColIdx();
    if (ri < 0) return;
    const inputs  = anyInput.closest('tr').querySelectorAll('td:not(.td-del) input');
    const funding = parseNum(inputs[fi]?.value);
    const monthly = parseNum(inputs[mi]?.value);
    inputs[ri].value = (funding > 0 && monthly > 0)
      ? (monthly * 12 / funding * 100).toFixed(1) + '%' : '';
  }

  /* ── Recalculate all ROIs ── */
  function recalcAllROIs() {
    document.getElementById('tbody').querySelectorAll('tr:not(.tr-add)').forEach(tr => {
      recalcROI(tr.querySelector('td:not(.td-del) input'));
    });
  }

  /* ── Recalculate TWD group-sum rows and Available row ── */
  function recalcSummaryRows() {
    const { inst: ii, prod: pi, fund: fi, month: mi } = getColIdx();
    const SUMMARY = ['TWD', 'Deposit', 'Available'];

    // Build groups
    const groups = [];
    let cur = null;
    document.getElementById('tbody').querySelectorAll('tr:not(.tr-add)').forEach(tr => {
      const inp  = Array.from(tr.querySelectorAll('td:not(.td-del) input'));
      const inst = inp[ii]?.value.trim();
      if (inst) { cur = { inst, rows: [] }; groups.push(cur); }
      if (cur) cur.rows.push({ tr, inp });
    });

    const twdFundByGroup = {};

    groups.forEach(({ inst, rows }) => {
      const srcRows = rows.filter(r => !SUMMARY.includes(r.inp[pi]?.value.trim()));
      const twdRow  = rows.find(r => r.inp[pi]?.value.trim() === 'TWD');
      if (!twdRow) return;

      const srcFund  = srcRows.reduce((s, r) => s + parseNum(r.inp[fi]?.value), 0);
      const srcMonth = srcRows.reduce((s, r) => s + parseNum(r.inp[mi]?.value), 0);

      // Preserve exchange rate: rate = current_TWD / current_src_sum
      const curTWD = parseNum(twdRow.inp[fi]?.value);
      const rate   = srcFund > 0 ? curTWD / srcFund : 1;

      const newFund  = Math.round(srcFund  * rate);
      const newMonth = Math.round(srcMonth * rate);

      twdRow.inp[fi].value = newFund  ? fmtNum(newFund)  : '';
      twdRow.inp[mi].value = newMonth ? fmtNum(newMonth) : '';
      twdFundByGroup[inst] = newFund;
    });

    // Available = Deposit − previous group's TWD
    groups.forEach(({ rows }, gi) => {
      const availRow = rows.find(r => r.inp[pi]?.value.trim() === 'Available');
      const depRow   = rows.find(r => r.inp[pi]?.value.trim() === 'Deposit');
      if (!availRow || !depRow) return;
      const deposit  = parseNum(depRow.inp[fi]?.value);
      const invested = gi > 0 ? (twdFundByGroup[groups[gi - 1].inst] ?? 0) : 0;
      availRow.inp[fi].value = fmtNum(deposit - invested);
    });

    recalcAllROIs();
  }

  function parseNum(s) {
    const n = parseFloat(String(s ?? '').replace(/[$,\s]/g, ''));
    return isNaN(n) ? 0 : n;
  }

  function fmtNum(n) {
    return '$' + Math.round(n).toLocaleString();
  }

  /* ── Row operations ── */
  function deleteRow(btn) {
    if (!confirm('Delete this row?')) return;
    btn.closest('tr').remove();
    updateRowCount();
  }

  function addRow() {
    const thead  = document.getElementById('thead');
    const tbody  = document.getElementById('tbody');
    const colCnt = thead.querySelectorAll('th:not(.th-del)').length;
    const addTr  = tbody.querySelector('.tr-add');

    const tr = document.createElement('tr');

    const delTd = document.createElement('td');
    delTd.className = 'td-del';
    delTd.innerHTML = '<button class="del-btn" onclick="deleteRow(this)">✕</button>';
    tr.appendChild(delTd);

    const cols = Array.from(thead.querySelectorAll('th:not(.th-del)')).map(th => th.textContent);
    const fundIdx    = cols.findIndex(c => /funding/i.test(c));
    const monthlyIdx = cols.findIndex(c => /monthly/i.test(c));
    const roiIdx     = cols.findIndex(c => /roi/i.test(c));

    for (let i = 0; i < colCnt; i++) {
      const td  = document.createElement('td');
      const inp = document.createElement('input');
      inp.type       = 'text';
      inp.dataset.col = i;
      if (i === roiIdx) {
        inp.className = 'roi-cell';
        inp.readOnly  = true;
        inp.title     = 'Auto-calculated: Monthly Average × 12 ÷ Funding';
      } else if (i === fundIdx || i === monthlyIdx) {
        inp.oninput = () => onCellChange(inp);
      }
      td.appendChild(inp);
      tr.appendChild(td);
    }

    tbody.insertBefore(tr, addTr);
    tr.querySelector('input').focus();
    updateRowCount();
  }

  function updateRowCount() {
    const n = document.getElementById('tbody').querySelectorAll('tr:not(.tr-add)').length;
    document.getElementById('rowCount').textContent = n + ' rows';
  }

  /* ── Save ── */
  async function saveData() {
    if (!accessToken) { pendingSave = true; footerMsg('', 'Signing in…'); signIn(); return; }

    const thead   = document.getElementById('thead');
    const tbody   = document.getElementById('tbody');
    const headers = Array.from(thead.querySelectorAll('th:not(.th-del)')).map(th => th.textContent);
    const rows    = Array.from(tbody.querySelectorAll('tr:not(.tr-add)')).map(tr =>
      Array.from(tr.querySelectorAll('td:not(.td-del) input')).map(i => i.value.trim())
    );
    const values = [headers, ...rows];

    document.getElementById('overlay').classList.add('on');
    try {
      const res = await fetch(
        `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(RANGE)}?valueInputOption=USER_ENTERED`,
        {
          method: 'PUT',
          headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ range: RANGE, majorDimension: 'ROWS', values })
        }
      );
      const result = await res.json();
      if (!res.ok) throw new Error(result.error?.message || 'Save failed');
      savedData = values;
      footerMsg('ok', `✓ Saved — ${result.updatedCells} cells written to Google Sheets`);
    } catch (err) {
      footerMsg('err', '✗ ' + err.message);
      alert('Save failed: ' + err.message);
    } finally {
      document.getElementById('overlay').classList.remove('on');
    }
  }

  /* ── Cancel / Exit ── */
  function cancelChanges() {
    if (!confirm('Discard all unsaved changes?')) return;
    renderGrid(savedData);
    footerMsg('', '');
  }

  function exitPage() {
    if (accessToken) {
      try { google.accounts.oauth2.revoke(accessToken); } catch(_) {}
      accessToken = null;
    }
    setEditable(false);
    footerMsg('', 'Signed out — view-only mode');
  }

  /* ── Helpers ── */
  function setDot(state) {
    document.getElementById('dot').className = 'dot' + (state === 'spin' ? ' spin' : state === 'error' ? ' error' : state === 'warn' ? ' warn' : '');
  }
  function setStatus(msg) { document.getElementById('statusMsg').textContent = msg; }
  function footerMsg(type, msg) {
    const el = document.getElementById('footerMsg');
    el.textContent = msg;
    el.className = type ? type : '';
  }
  function esc(s) {
    return String(s ?? '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── Seasonal fruit ── */
  (function () {
    const W = 90, H = 112;
    const $ = (tag, a, ...kids) => {
      const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
      Object.entries(a||{}).forEach(([k,v]) => el.setAttribute(k,v));
      kids.forEach(k => el.appendChild(k));
      return el;
    };

    // Reusable leaf helper
    function leaf(x1,y1,cx,cy,x2,y2,col='#3aaa3a'){
      return $('path',{d:`M${x1} ${y1} Q${cx} ${cy} ${x2} ${y2}`,fill:col});
    }
    function stem(x1,y1,x2,y2){
      return $('line',{x1,y1,x2,y2,stroke:'#6b3a1f','stroke-width':2.5,'stroke-linecap':'round'});
    }

    const fruits = {
      // ── Jan: Strawberry ──
      1: { label:'草莓 Strawberry', draw() {
        const s = $('svg',{width:W,height:H,viewBox:`0 0 ${W} ${H}`});
        // leaves
        [[-8,-5],[-1,-14],[8,-5],[15,0],[-15,0]].forEach(([dx,dy])=>
          s.appendChild($('path',{d:`M45 24 Q${45+dx} ${24+dy} ${45+dx*0.6} 32`,
            fill:'none',stroke:'#2d8a2d','stroke-width':3,'stroke-linecap':'round'})));
        // body
        s.appendChild($('path',{d:'M45 28 Q66 32 70 60 Q68 88 45 104 Q22 88 20 60 Q24 32 45 28Z',
          fill:'#e8352a'}));
        // seeds
        [[34,48],[45,43],[56,48],[31,62],[42,58],[53,62],[37,76],[48,72]].forEach(([x,y])=>
          s.appendChild($('ellipse',{cx:x,cy:y,rx:2,ry:2.5,fill:'#f5e030'})));
        // shine
        s.appendChild($('path',{d:'M30 42 Q36 36 42 40',fill:'none',
          stroke:'rgba(255,255,255,.5)','stroke-width':2.5,'stroke-linecap':'round'}));
        return s;
      }},

      // ── Mar: Wax Apple 蓮霧 ──
      3: { label:'蓮霧 Wax Apple', draw() {
        const s = $('svg',{width:W,height:H,viewBox:`0 0 ${W} ${H}`});
        s.appendChild(stem(45,4,45,18));
        s.appendChild(leaf(45,12,62,4,63,17,'#3aaa3a'));
        // bell body
        s.appendChild($('path',{d:'M45 20 Q63 22 69 52 Q73 76 64 94 Q56 108 45 110 Q34 108 26 94 Q17 76 21 52 Q27 22 45 20Z',
          fill:'#e8506a'}));
        // dimple top
        s.appendChild($('ellipse',{cx:45,cy:24,rx:9,ry:5,fill:'#c02848',opacity:.6}));
        // crown bottom
        s.appendChild($('path',{d:'M33 107 L37 100 L41 107 L45 100 L49 107 L53 100 L57 107',
          fill:'none',stroke:'#c02848','stroke-width':2,'stroke-linecap':'round','stroke-linejoin':'round'}));
        // shine
        s.appendChild($('path',{d:'M29 42 Q35 34 42 38',fill:'none',
          stroke:'rgba(255,255,255,.5)','stroke-width':2.5,'stroke-linecap':'round'}));
        return s;
      }},

      // ── Apr: Pineapple 鳳梨 ──
      4: { label:'鳳梨 Pineapple', draw() {
        const s = $('svg',{width:W,height:H,viewBox:`0 0 ${W} ${H}`});
        const defs = $('defs',{});
        const clip = $('clipPath',{id:'pc'});
        clip.appendChild($('ellipse',{cx:45,cy:72,rx:28,ry:35}));
        defs.appendChild(clip);
        s.appendChild(defs);
        // crown
        const crownData = [
          [45,10,43,26,'#1f6e1f',3],[45,10,47,26,'#1f6e1f',3],
          [45,13,37,27,'#2d8a2d',2.5],[45,13,53,27,'#2d8a2d',2.5],
          [43,16,30,28,'#3aaa3a',2],[47,16,60,28,'#3aaa3a',2],
          [41,19,22,30,'#2d8a2d',1.5],[49,19,68,30,'#2d8a2d',1.5],
        ];
        crownData.forEach(([x1,y1,x2,y2,c,w])=>
          s.appendChild($('line',{x1,y1,x2,y2,stroke:c,'stroke-width':w,'stroke-linecap':'round'})));
        // body
        s.appendChild($('ellipse',{cx:45,cy:72,rx:28,ry:35,fill:'#f5c430'}));
        // crosshatch grid clipped
        const g = $('g',{'clip-path':'url(#pc)'});
        for (let i=-2;i<8;i++){
          g.appendChild($('line',{x1:0,y1:37+i*14,x2:90,y2:37+i*14+90,stroke:'#c8950a','stroke-width':.9}));
          g.appendChild($('line',{x1:0,y1:37+i*14+90,x2:90,y2:37+i*14,stroke:'#c8950a','stroke-width':.9}));
        }
        s.appendChild(g);
        // shine
        s.appendChild($('path',{d:'M24 58 Q30 50 36 54',fill:'none',
          stroke:'rgba(255,255,255,.4)','stroke-width':3,'stroke-linecap':'round'}));
        return s;
      }},

      // ── May: Mango 芒果 ──
      5: { label:'芒果 Mango', draw() {
        const s = $('svg',{width:W,height:H,viewBox:`0 0 ${W} ${H}`});
        s.appendChild(stem(46,6,47,20));
        s.appendChild($('path',{d:'M47 14 Q65 7 66 20 Q56 25 47 16',fill:'#3aaa3a'}));
        s.appendChild($('path',{d:'M30 30 Q14 48 16 72 Q20 98 45 104 Q68 98 74 72 Q76 50 66 36 Q56 24 45 24 Q37 24 30 30Z',
          fill:'#f5a623'}));
        s.appendChild($('ellipse',{cx:56,cy:44,rx:16,ry:13,fill:'#e8652a',opacity:.4}));
        s.appendChild($('path',{d:'M32 40 Q28 58 30 76',fill:'none',
          stroke:'rgba(255,220,100,.6)','stroke-width':4,'stroke-linecap':'round'}));
        s.appendChild($('path',{d:'M33 36 Q39 30 45 34',fill:'none',
          stroke:'rgba(255,255,255,.5)','stroke-width':2.5,'stroke-linecap':'round'}));
        return s;
      }},

      // ── Jun: Lychee 荔枝 ──
      6: { label:'荔枝 Lychee', draw() {
        const s = $('svg',{width:W,height:H,viewBox:`0 0 ${W} ${H}`});
        s.appendChild(stem(45,6,45,22));
        s.appendChild($('path',{d:'M45 14 Q62 7 63 20 Q53 24 45 16',fill:'#3aaa3a'}));
        s.appendChild($('circle',{cx:45,cy:64,r:36,fill:'#cc2a3a'}));
        [[28,48],[44,38],[60,46],[22,62],[38,55],[54,57],[67,63],
         [28,76],[44,79],[60,77]].forEach(([x,y])=>
          s.appendChild($('circle',{cx:x,cy:y,r:5.5,fill:'#aa1828',opacity:.75})));
        s.appendChild($('path',{d:'M28 46 Q34 40 42 44',fill:'none',
          stroke:'rgba(255,255,255,.4)','stroke-width':2.5,'stroke-linecap':'round'}));
        return s;
      }},

      // ── Jul: Longan 龍眼 ──
      7: { label:'龍眼 Longan', draw() {
        const s = $('svg',{width:W,height:H,viewBox:`0 0 ${W} ${H}`});
        // stems
        [[[45,6],[45,28]],[[45,20],[26,38]],[[45,22],[45,40]],[[45,20],[64,38]],
         [[26,38],[16,53]],[[26,38],[34,53]],[[64,38],[74,53]]].forEach(([[x1,y1],[x2,y2]])=>
          s.appendChild($('line',{x1,y1,x2,y2,stroke:'#6b3a1f','stroke-width':1.8})));
        s.appendChild($('path',{d:'M45 10 Q58 4 60 15 Q52 19 45 12',fill:'#3aaa3a'}));
        [[16,66,14],[41,54,14],[65,64,14],[33,85,13],[59,87,13]].forEach(([cx,cy,r])=>{
          s.appendChild($('circle',{cx,cy,r,fill:'#c8a060'}));
          s.appendChild($('circle',{cx,cy,r:r*0.55,fill:'#8b5e2a',opacity:.4}));
        });
        s.appendChild($('path',{d:'M32 47 Q38 42 44 46',fill:'none',
          stroke:'rgba(255,255,255,.5)','stroke-width':2,'stroke-linecap':'round'}));
        return s;
      }},

      // ── Aug: Guava 芭樂 ──
      8: { label:'芭樂 Guava', draw() {
        const s = $('svg',{width:W,height:H,viewBox:`0 0 ${W} ${H}`});
        s.appendChild(stem(45,4,45,18));
        s.appendChild($('path',{d:'M45 10 Q62 3 63 16 Q53 20 45 12',fill:'#3aaa3a'}));
        s.appendChild($('circle',{cx:45,cy:62,r:38,fill:'#c8d840'}));
        s.appendChild($('ellipse',{cx:52,cy:55,rx:20,ry:18,fill:'#dce854',opacity:.55}));
        // flower end star
        const star = 'M45 98 '+[0,1,2,3,4].map(i=>{
          const a1=(i*72-90)*Math.PI/180, a2=((i*72+36)-90)*Math.PI/180;
          return `L${(45+9*Math.cos(a1)).toFixed(1)} ${(98+9*Math.sin(a1)).toFixed(1)} `+
                 `L${(45+5*Math.cos(a2)).toFixed(1)} ${(98+5*Math.sin(a2)).toFixed(1)}`;
        }).join(' ')+'Z';
        s.appendChild($('path',{d:star,fill:'#a0b820'}));
        s.appendChild($('circle',{cx:45,cy:98,r:4,fill:'#f5b8c8',opacity:.7}));
        s.appendChild($('path',{d:'M24 46 Q30 38 38 42',fill:'none',
          stroke:'rgba(255,255,255,.5)','stroke-width':3,'stroke-linecap':'round'}));
        return s;
      }},

      // ── Sep: Pomelo 柚子 ──
      9: { label:'柚子 Pomelo', draw() {
        const s = $('svg',{width:W,height:H,viewBox:`0 0 ${W} ${H}`});
        s.appendChild(stem(45,4,45,20));
        s.appendChild($('path',{d:'M45 10 Q62 3 63 16 Q53 20 45 12',fill:'#3aaa3a'}));
        s.appendChild($('ellipse',{cx:45,cy:66,rx:39,ry:41,fill:'#ccd840'}));
        s.appendChild($('ellipse',{cx:45,cy:68,rx:30,ry:32,fill:'#dce854'}));
        s.appendChild($('ellipse',{cx:45,cy:28,rx:10,ry:7,fill:'#b8c420',opacity:.6}));
        s.appendChild($('path',{d:'M16 50 Q23 38 33 44',fill:'none',
          stroke:'rgba(255,255,255,.4)','stroke-width':4,'stroke-linecap':'round'}));
        return s;
      }},

      // ── Oct: Persimmon 柿子 ──
      10: { label:'柿子 Persimmon', draw() {
        const s = $('svg',{width:W,height:H,viewBox:`0 0 ${W} ${H}`});
        s.appendChild(stem(45,8,45,22));
        // calyx 4 leaves
        [[-1,-1],[1,-1],[1,1],[-1,1]].forEach(([sx,sy])=>
          s.appendChild($('path',{
            d:`M45 22 Q${45+sx*20} ${22+sy*12} ${45+sx*18} ${22+sy*18} Q45 28 ${45-sx*18} ${22+sy*18} Q${45-sx*20} ${22+sy*12} 45 22Z`,
            fill: sx===sy ? '#3aaa3a' : '#2d8a2d'})));
        s.appendChild($('circle',{cx:45,cy:70,r:38,fill:'#f57c2a'}));
        // subtle ribs
        [[-18,0],[18,0],[0,-18],[0,18]].forEach(([dx,dy])=>
          s.appendChild($('path',{
            d:`M45 32 Q${45+dx} ${51+dy} ${45+dx*.5} 108`,fill:'none',
            stroke:'#df6818','stroke-width':1,opacity:.35})));
        s.appendChild($('path',{d:'M18 54 Q26 42 36 48',fill:'none',
          stroke:'rgba(255,255,255,.45)','stroke-width':3.5,'stroke-linecap':'round'}));
        return s;
      }},

      // ── Nov: Sugar Apple 釋迦 ──
      11: { label:'釋迦 Sugar Apple', draw() {
        const s = $('svg',{width:W,height:H,viewBox:`0 0 ${W} ${H}`});
        s.appendChild(stem(45,5,45,20));
        s.appendChild($('path',{d:'M45 12 Q60 5 62 17 Q52 21 45 14',fill:'#3aaa3a'}));
        // bumpy scales body
        s.appendChild($('circle',{cx:45,cy:64,r:36,fill:'#7aaa50'}));
        [[30,44],[45,38],[60,44],[22,58],[38,52],[52,52],[67,58],
         [26,72],[40,66],[55,66],[68,72],[32,84],[46,80],[60,84]].forEach(([x,y])=>
          s.appendChild($('ellipse',{cx:x,cy:y,rx:9,ry:8,fill:'#6a9840',stroke:'#557830','stroke-width':.8})));
        s.appendChild($('path',{d:'M25 48 Q32 40 40 45',fill:'none',
          stroke:'rgba(255,255,255,.4)','stroke-width':2.5,'stroke-linecap':'round'}));
        return s;
      }},

      // ── Dec: Strawberry (same as Jan) ──
      12: null,
    };
    fruits[2]  = fruits[1];   // Feb  → Strawberry
    fruits[12] = fruits[1];   // Dec  → Strawberry

    const month = new Date().getMonth() + 1;
    const entry = fruits[month] || fruits[4];
    const wrap  = document.getElementById('seasonal-fruit');
    const svg   = entry.draw();
    wrap.appendChild(svg);
    const lbl = document.createElement('div');
    lbl.className = 'fruit-label';
    lbl.textContent = entry.label;
    wrap.appendChild(lbl);
  })();
</script>
</body>
</html>
