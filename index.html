<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grace — Shopping List</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', -apple-system, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%);
      color: white;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    header h1  { font-size: 20px; font-weight: 500; }
    header sub { font-size: 12px; opacity: .85; display: block; margin-top: 2px; }

    .btn-signin {
      background: white; color: #1a73e8;
      border: none; padding: 8px 18px; border-radius: 6px;
      cursor: pointer; font-size: 14px; font-weight: 500;
    }
    .btn-signin:hover { background: #e8f0fe; }
    #userInfo { font-size: 13px; color: rgba(255,255,255,.9); }

    /* ── Status bar ── */
    .statusbar {
      background: white; border-bottom: 1px solid #e0e0e0;
      padding: 7px 24px; display: flex; align-items: center;
      gap: 10px; font-size: 13px; color: #5f6368; flex-shrink: 0;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #34a853; }
    .dot.spin { background: #fbbc04; animation: blink 1s infinite; }
    .dot.error { background: #ea4335; }
    .dot.warn  { background: #ff9800; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ── Main ── */
    main { flex: 1; padding: 20px 24px; overflow: auto; }

    .stores-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
      align-items: start;
    }

    /* ── Store card ── */
    .store-card {
      background: white; border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,.12); overflow: hidden;
    }

    .store-head {
      padding: 12px 16px;
      border-bottom: 2px solid #1a73e8;
      display: flex; align-items: center; gap: 8px;
    }
    .store-name-input {
      flex: 1; border: none; outline: none; background: transparent;
      font-size: 14px; font-weight: 700; color: #202124;
      text-transform: uppercase; letter-spacing: .4px;
      font-family: inherit;
    }
    .store-name-input:focus { background: #fffde7; border-radius: 4px; padding: 2px 4px; }
    .del-store-btn {
      background: none; border: none; color: #ccc; cursor: pointer;
      font-size: 14px; padding: 3px 6px; border-radius: 4px;
      transition: color .15s, background .15s;
    }
    .del-store-btn:hover { color: #ea4335; background: #fce8e6; }

    /* ── Item list ── */
    .item-list { list-style: none; }

    .item-row {
      display: flex; align-items: center;
      padding: 8px 16px; gap: 10px;
      border-bottom: 1px solid #f0f0f0;
    }
    .item-row:last-child { border-bottom: none; }

    .item-check {
      width: 17px; height: 17px; flex-shrink: 0;
      cursor: pointer; accent-color: #1a73e8;
    }
    .item-input {
      flex: 1; border: none; outline: none; background: transparent;
      font-size: 14px; font-family: inherit; color: #202124; min-width: 0;
    }
    .item-input:focus { background: #fffde7; border-radius: 4px; padding: 1px 4px; }
    .item-row.checked .item-input { text-decoration: line-through; color: #9aa0a6; }

    .del-item-btn {
      background: none; border: none; color: #ccc; cursor: pointer;
      font-size: 13px; padding: 3px 5px; border-radius: 4px; flex-shrink: 0;
      transition: color .15s, background .15s;
    }
    .del-item-btn:hover { color: #ea4335; background: #fce8e6; }

    .add-item-btn {
      display: block; width: 100%; padding: 8px 16px;
      background: none; border: none; border-top: 1px solid #f0f0f0;
      text-align: left; color: #1a73e8; font-size: 13px; cursor: pointer;
    }
    .add-item-btn:hover { background: #f0f7ff; }

    /* ── Add store ── */
    .add-store-wrap { padding: 4px 0 8px; }
    .add-store-btn {
      width: 100%; padding: 11px;
      border: 2px dashed #c5d8fb; border-radius: 10px;
      background: none; color: #1a73e8; font-size: 14px; cursor: pointer;
      transition: all .15s;
    }
    .add-store-btn:hover { background: #e8f0fe; border-color: #1a73e8; }

    /* ── Footer ── */
    footer {
      background: white; border-top: 1px solid #e0e0e0;
      padding: 13px 24px;
      display: flex; justify-content: flex-end;
      align-items: center; gap: 10px; flex-shrink: 0;
    }
    #footerMsg { margin-right: auto; font-size: 13px; color: #5f6368; }
    #footerMsg.ok  { color: #34a853; }
    #footerMsg.err { color: #ea4335; }

    .btn {
      padding: 9px 22px; border-radius: 6px;
      font-size: 14px; font-weight: 500;
      cursor: pointer; border: none; transition: all .15s;
    }
    .btn-save   { background: #1a73e8; color: white; }
    .btn-save:hover   { background: #1557b0; }
    .btn-cancel { background: #5f6368; color: white; }
    .btn-cancel:hover { background: #3c4043; }
    .btn-exit   { background: none; color: #5f6368; border: 1px solid #dadce0; }
    .btn-exit:hover { background: #f1f3f4; }

    /* ── Saving overlay ── */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.35); z-index: 300;
      align-items: center; justify-content: center;
    }
    .overlay.on { display: flex; }
    .overlay-box {
      background: white; padding: 32px 48px;
      border-radius: 12px; text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,.15);
    }
    .spinner {
      width: 36px; height: 36px; border: 3px solid #e0e0e0;
      border-top-color: #1a73e8; border-radius: 50%;
      animation: spin .8s linear infinite; margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- Saving overlay -->
<div class="overlay" id="overlay">
  <div class="overlay-box">
    <div class="spinner"></div>
    <div>Saving to Google Sheets…</div>
  </div>
</div>

<!-- Header -->
<header>
  <div>
    <h1>Grace — Shopping List</h1>
    <sub>2dolist › Sheet1</sub>
  </div>
  <div>
    <button class="btn-signin" id="signInBtn" onclick="signIn()">🔑 Sign in to Edit</button>
    <span id="userInfo" style="display:none">✓ Signed in — edit mode active</span>
  </div>
</header>

<!-- Status bar -->
<div class="statusbar">
  <div class="dot" id="dot"></div>
  <span id="statusMsg">Initialising…</span>
</div>

<!-- Grid -->
<main>
  <div class="stores-grid" id="storesGrid"></div>
  <div class="add-store-wrap" id="addStoreWrap" style="display:none">
    <button class="add-store-btn" onclick="addStore()">＋ Add Store</button>
  </div>
</main>

<!-- Footer -->
<footer>
  <span id="footerMsg"></span>
  <button class="btn btn-cancel" onclick="cancelChanges()">Cancel</button>
  <button class="btn btn-save"   onclick="saveData()">Save</button>
  <button class="btn btn-exit"   onclick="exitPage()">Exit</button>
</footer>

<script src="https://accounts.google.com/gsi/client" async></script>
<script>
  /* ── Config ── */
  const CLIENT_ID      = '944388535773-h9npofkg9llnfqq79te504j5adfofshq.apps.googleusercontent.com';
  const API_KEY        = 'AIzaSyCQjHQbMlSYHLWWFNhqCwy4u3zisCyknqo';
  const SPREADSHEET_ID = '10whkiWZZJ0UWTMbr7LaaWVNCbfYDgrWsO7z-8yriUGc';
  const SHEET_NAME     = 'Sheet1';
  const RANGE          = `${SHEET_NAME}!A:Z`;

  /* ── Fallback data (snapshot 2026-04-30) ── */
  const SEED = [
    ['Costco',  '蝦子，益生菌', '木瓜霜'],
    ['家樂福', '有柄鍋子刷具', '溼式拖地紙', '靜電拖地紙'],
    ['B&Q',    '水波爐鐵架輪子'],
  ];

  /* ── State ── */
  let accessToken = null;
  let tokenClient = null;
  let savedData   = null;
  let editable    = false;
  let pendingSave = false;

  /* ── Boot ── */
  window.onload = () => {
    loadData();
    const wait = setInterval(() => {
      if (window.google?.accounts) {
        clearInterval(wait);
        tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: CLIENT_ID,
          scope: 'https://www.googleapis.com/auth/spreadsheets',
          callback: resp => {
            if (resp.error) return;
            accessToken = resp.access_token;
            setEditable(true);
            loadData();
            if (pendingSave) { pendingSave = false; saveData(); }
          }
        });
      }
    }, 200);
  };

  /* ── Auth ── */
  function signIn() {
    if (!tokenClient) { alert('Google sign-in is still loading, please try again.'); return; }
    tokenClient.requestAccessToken();
  }

  function setEditable(on) {
    editable = on;
    document.getElementById('signInBtn').style.display = on ? 'none' : '';
    document.getElementById('userInfo').style.display  = on ? '' : 'none';
    if (savedData) renderGrid(savedData);
  }

  /* ── Load ── */
  async function loadData() {
    setDot('spin'); setStatus('Loading from Google Sheets…');
    try {
      let url, opts = {};
      if (accessToken) {
        url  = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(RANGE)}`;
        opts = { headers: { Authorization: `Bearer ${accessToken}` } };
      } else {
        url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(RANGE)}?key=${API_KEY}`;
      }
      const res  = await fetch(url, opts);
      const json = await res.json();
      if (!res.ok) throw new Error(json.error?.message || `HTTP ${res.status}`);
      const vals = json.values || [];
      if (!vals.length) throw new Error('Sheet returned no data');
      savedData = vals;
      renderGrid(vals);
      setDot('ok'); setStatus(`${vals.length} stores loaded`);
    } catch (err) {
      savedData = SEED;
      renderGrid(SEED);
      setDot('warn'); setStatus(`Showing cached data (${err.message})`);
    }
  }

  /* ── Render ── */
  function renderGrid(data) {
    document.getElementById('storesGrid').innerHTML =
      data.map(row => buildStoreCard(row)).join('');
    document.getElementById('addStoreWrap').style.display = editable ? '' : 'none';
  }

  function buildStoreCard(row) {
    const store = esc(row[0] ?? '');
    const items = row.slice(1).filter(v => (v ?? '').trim() !== '');
    const itemsHtml = items.map(v => buildItemRow(v)).join('');
    return `
      <div class="store-card">
        <div class="store-head">
          <input class="store-name-input" value="${store}"
                 ${editable ? '' : 'readonly'} placeholder="Store name">
          ${editable ? `<button class="del-store-btn" onclick="deleteStore(this)" title="Remove store">✕</button>` : ''}
        </div>
        <ul class="item-list">${itemsHtml}</ul>
        ${editable ? `<button class="add-item-btn" onclick="addItem(this)">＋ Add item</button>` : ''}
      </div>`;
  }

  function buildItemRow(text) {
    return `
      <li class="item-row">
        <input type="checkbox" class="item-check" onchange="this.closest('.item-row').classList.toggle('checked',this.checked)">
        <input type="text" class="item-input" value="${esc(text)}"
               ${editable ? '' : 'readonly'} placeholder="Item">
        ${editable ? `<button class="del-item-btn" onclick="this.closest('.item-row').remove()" title="Remove">✕</button>` : ''}
      </li>`;
  }

  /* ── Edit operations ── */
  function addItem(btn) {
    const ul = btn.previousElementSibling;
    const li = document.createElement('li');
    li.className = 'item-row';
    li.innerHTML = `
      <input type="checkbox" class="item-check"
             onchange="this.closest('.item-row').classList.toggle('checked',this.checked)">
      <input type="text" class="item-input" placeholder="Item">
      <button class="del-item-btn" onclick="this.closest('.item-row').remove()" title="Remove">✕</button>`;
    ul.appendChild(li);
    li.querySelector('.item-input').focus();
  }

  function deleteStore(btn) {
    if (!confirm('Remove this store and all its items?')) return;
    btn.closest('.store-card').remove();
  }

  function addStore() {
    const grid = document.getElementById('storesGrid');
    const wrap = document.getElementById('addStoreWrap');
    const tmp  = document.createElement('div');
    tmp.innerHTML = buildStoreCard(['']);
    const card = tmp.firstElementChild;
    grid.insertBefore(card, null);
    card.querySelector('.store-name-input').focus();
  }

  /* ── Save ── */
  async function saveData() {
    if (!accessToken) { pendingSave = true; footerMsg('', 'Signing in…'); signIn(); return; }

    const rows = [];
    document.querySelectorAll('.store-card').forEach(card => {
      const store = card.querySelector('.store-name-input').value.trim();
      if (!store) return;
      const items = Array.from(card.querySelectorAll('.item-input'))
        .map(i => i.value.trim()).filter(Boolean);
      rows.push([store, ...items]);
    });

    document.getElementById('overlay').classList.add('on');
    try {
      const res = await fetch(
        `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(RANGE)}?valueInputOption=USER_ENTERED`,
        {
          method: 'PUT',
          headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ range: RANGE, majorDimension: 'ROWS', values: rows })
        }
      );
      const result = await res.json();
      if (!res.ok) throw new Error(result.error?.message || 'Save failed');
      savedData = rows;
      footerMsg('ok', `✓ Saved — ${result.updatedCells} cells written`);
    } catch (err) {
      footerMsg('err', '✗ ' + err.message);
      alert('Save failed: ' + err.message);
    } finally {
      document.getElementById('overlay').classList.remove('on');
    }
  }

  /* ── Cancel / Exit ── */
  function cancelChanges() {
    if (!confirm('Discard all unsaved changes?')) return;
    renderGrid(savedData);
    footerMsg('', '');
  }

  function exitPage() {
    if (accessToken) {
      try { google.accounts.oauth2.revoke(accessToken); } catch(_) {}
      accessToken = null;
    }
    setEditable(false);
    footerMsg('', 'Signed out — view-only mode');
  }

  /* ── Helpers ── */
  function setDot(state) {
    document.getElementById('dot').className =
      'dot' + (state === 'spin' ? ' spin' : state === 'error' ? ' error' : state === 'warn' ? ' warn' : '');
  }
  function setStatus(msg) { document.getElementById('statusMsg').textContent = msg; }
  function footerMsg(type, msg) {
    const el = document.getElementById('footerMsg');
    el.textContent = msg;
    el.className = type || '';
  }
  function esc(s) {
    return String(s ?? '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
